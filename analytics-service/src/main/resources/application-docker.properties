spring.application.name=analytics-service
server.port=4002

logging.level.com.mav.analyticsservice.kafka=INFO

# Kafka
spring.kafka.bootstrap-servers=kafka:9092
# Consumer group (override in docker-compose with SPRING_KAFKA_CONSUMER_GROUP_ID)
spring.kafka.consumer.group-id=analytics-service
# Read from start of topic when no offset is committed (e.g. new consumer group)

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer